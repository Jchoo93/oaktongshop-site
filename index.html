<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>오크통샵 oaktongshop — 곧 만나요</title>
<meta name="description" content="우주에서 골라온 오늘의 잇템. 오크통샵, 곧 오픈합니다.">
<meta name="robots" content="noindex">
<meta property="og:title" content="오크통샵 oaktongshop — 곧 만나요 🌌">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;
    background:radial-gradient(1000px 600px at 50% -10%,rgba(139,92,246,.4),transparent 60%),radial-gradient(700px 500px at 80% 20%,rgba(108,140,255,.22),transparent 60%),#0a0b14;
    color:#eef0f6;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard",sans-serif;overflow:hidden}
  .stars{position:fixed;inset:0;background-image:radial-gradient(1.4px 1.4px at 20% 30%,#fff,transparent),radial-gradient(1px 1px at 70% 22%,#fff,transparent),radial-gradient(1.2px 1.2px at 42% 68%,#fff,transparent),radial-gradient(1px 1px at 85% 58%,#fff,transparent),radial-gradient(1.3px 1.3px at 12% 75%,#fff,transparent),radial-gradient(1px 1px at 92% 40%,#fff,transparent);opacity:.55;animation:tw 6s ease-in-out infinite alternate}
  @keyframes tw{from{opacity:.35}to{opacity:.7}}
  .box{position:relative;max-width:540px}
  .eyebrow{font-size:13px;letter-spacing:4px;color:#9aa3b8;text-transform:uppercase}
  h1{font-size:clamp(34px,7vw,56px);font-weight:900;margin:16px 0 12px;letter-spacing:-1px;line-height:1.1}
  .grad{background:linear-gradient(90deg,#a78bfa,#6c8cff,#1EC800);-webkit-background-clip:text;background-clip:text;color:transparent}
  p.t{font-size:clamp(15px,2.4vw,19px);color:#cdd3e6}
  .badge{display:inline-block;margin-top:26px;font-size:14px;color:#1EC800;border:1px solid rgba(30,200,0,.45);border-radius:999px;padding:8px 18px;font-weight:700}
  form{display:flex;gap:10px;max-width:420px;margin:30px auto 0}
  input{flex:1;background:rgba(255,255,255,.06);border:1px solid #2a3142;border-radius:999px;padding:14px 20px;color:#fff;font-size:15px}
  button{background:#1EC800;color:#04210a;border:none;border-radius:999px;padding:14px 22px;font-weight:800;font-size:15px;cursor:pointer}
  .ok{color:#1EC800;margin-top:14px;font-weight:700;display:none}
  .sns{margin-top:28px;color:#9aa3b8;font-size:14px}.sns a{color:#cdd3e6;text-decoration:none;margin:0 8px}
</style></head>
<body>
  <div class="stars"></div>
  <div class="box">
    <div class="eyebrow">OAKTONGSHOP</div>
    <h1>우주에서 골라온<br><span class="grad">오늘의 잇템</span> 🌌</h1>
    <p class="t">전 세계를 도는 쇼핑, 곧 시작합니다.</p>
    <div class="badge">🚀 오픈 준비 중</div>
    <form onsubmit="event.preventDefault();this.querySelector('.ok').style.display='block';this.querySelector('input').value='';">
      <input type="email" placeholder="이메일 — 오픈 소식 가장 먼저 받기" required>
      <button type="submit">알림 신청</button>
      <div class="ok">✅ 신청 완료! 오픈하면 가장 먼저 알려드릴게요.</div>
    </form>
    <div class="sns">@oaktongshop · <a href="https://instagram.com/oaktongshop" target="_blank" rel="noreferrer">Instagram</a><a href="https://youtube.com/@oaktongshop" target="_blank" rel="noreferrer">YouTube</a><a href="https://tiktok.com/@oaktongshop" target="_blank" rel="noreferrer">TikTok</a></div>
  </div>
</body></html>
